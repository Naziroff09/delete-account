<form action="https://formsubmit.co/mavisoft.dev@gmail.com" method="POST">

  <div class="field">
    <label>Phone Number</label>
    <input
      type="tel"
      name="phone"
      placeholder="+998 XX XXX XX XX"
      required
    />
  </div>

  <div class="field">
    <label>Reason for Deletion</label>

    <select name="reason" required>
      <option value="">Select a reason</option>
      <option>I no longer use the app</option>
      <option>Privacy concerns</option>
      <option>I have another account</option>
      <option>Other</option>
    </select>
  </div>

  <div class="field">
    <label>Additional Comments</label>

    <textarea
      name="comment"
      placeholder="Write your comments here..."
    ></textarea>
  </div>

  <!-- Email subject -->
  <input
    type="hidden"
    name="_subject"
    value="New Mavi Account Deletion Request"
  >

  <!-- Disable captcha -->
  <input
    type="hidden"
    name="_captcha"
    value="false"
  >

  <!-- Success page -->
  <input
    type="hidden"
    name="_next"
    value="https://naziroff09.github.io/delete-account/success.html"
  >

  <button class="btn" type="submit">
    Submit Deletion Request
  </button>

</form>
